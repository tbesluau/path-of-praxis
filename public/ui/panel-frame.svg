<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- dark shadow border -->
  <rect x="1" y="1" width="98" height="98" fill="none" stroke="#2d1800" stroke-width="4"/>
  <!-- gold outer border -->
  <rect x="3" y="3" width="94" height="94" fill="none" stroke="#c8922a" stroke-width="2.5"/>
  <!-- inner guide line -->
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#c8922a" stroke-width="1" opacity="0.45"/>
  <!-- top-left diamond -->
  <polygon points="10,3 17,10 10,17 3,10" fill="#c8922a"/>
  <polygon points="10,4.5 15.5,10 10,15.5 4.5,10" fill="#2d1800" opacity="0.45"/>
  <!-- top-right diamond -->
  <polygon points="90,3 97,10 90,17 83,10" fill="#c8922a"/>
  <polygon points="90,4.5 95.5,10 90,15.5 84.5,10" fill="#2d1800" opacity="0.45"/>
  <!-- bottom-left diamond -->
  <polygon points="10,83 17,90 10,97 3,90" fill="#c8922a"/>
  <polygon points="10,84.5 15.5,90 10,95.5 4.5,90" fill="#2d1800" opacity="0.45"/>
  <!-- bottom-right diamond -->
  <polygon points="90,83 97,90 90,97 83,90" fill="#c8922a"/>
  <polygon points="90,84.5 95.5,90 90,95.5 84.5,90" fill="#2d1800" opacity="0.45"/>
  <!-- mid-edge accent dots -->
  <circle cx="50" cy="2.5" r="2" fill="#c8922a"/>
  <circle cx="50" cy="97.5" r="2" fill="#c8922a"/>
  <circle cx="2.5" cy="50" r="2" fill="#c8922a"/>
  <circle cx="97.5" cy="50" r="2" fill="#c8922a"/>
</svg>
